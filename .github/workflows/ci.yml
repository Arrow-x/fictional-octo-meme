# For syntax, see https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax
name: Continuous Integration

on:
  workflow_call:
  push:
  pull_request:
  merge_group:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: { platform: linux, arch: x86_64, os: ubuntu-22.04 }
            target-type: template_debug
          - target: { platform: windows, arch: x86_64, os: windows-latest }
            target-type: template_release
          - target: { platform: macos, arch: universal, os: macos-latest }
            target-type: template_debug
          - target: { platform: android, arch: arm64, os: ubuntu-22.04 }
            target-type: template_debug
          - target: { platform: web, arch: wasm32, os: ubuntu-22.04 }
            target-type: template_release

    runs-on: ${{ matrix.target.os }}
    steps:
      # 1. Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      # 2. Python & SCons (godot-cpp requirement)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install SCons
        run: python -m pip install scons

      # 3. Environment Dependencies
      - name: Install Linux dependencies
        if: ${{ matrix.target.platform == 'linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build gcc-multilib g++-multilib

      - name: Setup Android NDK
        if: ${{ matrix.target.platform == 'android' }}
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c # Godot usually recommends r23c or r25c

      - name: Setup Emscripten
        if: ${{ matrix.target.platform == 'web' }}
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.62

      # 4. Configure CMake (Corrected Cross-Compilation)
      - name: Configure CMake
        shell: bash
        run: |
          # Define common flags
          BUILD_TYPE="${{ matrix.target-type == 'template_release' && 'Release' || 'Debug' }}"
          COMMON_FLAGS="-B build -G Ninja -DCMAKE_BUILD_TYPE=$BUILD_TYPE -DGODOT_PLATFORM=${{ matrix.target.platform }} -DGODOT_ARCH=${{ matrix.target.arch }}"

          if [ "${{ matrix.target.platform }}" = "web" ]; then
            # Web requires the emcmake wrapper to set up the toolchain automatically
            emcmake cmake $COMMON_FLAGS

          elif [ "${{ matrix.target.platform }}" = "android" ]; then
            # Android requires the NDK toolchain file
            cmake $COMMON_FLAGS \
              -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
              -DANDROID_ABI=arm64-v8a

          else
            # Linux, Windows, and macOS use standard native configuration
            cmake $COMMON_FLAGS
          fi

      # 5. Build
      - name: Build GDExtension
        run: cmake --build build

      # 6. Upload Artifacts
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gdextension-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.target-type }}
          path: bin/
          if-no-files-found: error
